services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bragi
      POSTGRES_USER: bragi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bragi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://bragi:${DB_PASSWORD}@db:5432/bragi
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node prisma/seed.js && node src/index.js"

  frontend:
    build: .
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
